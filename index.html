<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Зорелік">
<meta name="theme-color" content="#1b2a4a">
<title>Зорелік · Star Math</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

  /* THEME: neutral (default). Themes override these vars on <html data-theme>. */
  :root{
    --bg1:#2c3f6b; --bg2:#1b2a4a; --bg3:#131f38;
    --night-2:#243a63; --lilac:#a89be0; --gold:#ffd25a; --gold-deep:#f4a93b;
    --mint:#5fd6a6; --coral:#ff7a7a; --cream:#fdf7ec; --ink:#2a2440;
    --card:rgba(255,255,255,0.10); --card-solid:#f4f0ff;
    --accent:#ffd25a; --accent-deep:#f4a93b; --accent-soft:#a89be0;
    --glyph:"⭐"; /* theme decorative glyph */
    --radius:26px; --shadow:0 14px 40px rgba(10,14,30,0.35); font-size:16px;
  }
  html[data-theme="pink"]{
    --bg1:#5a2a52; --bg2:#3e1f43; --bg3:#2a1530;
    --night-2:#5e2f5a; --lilac:#ffb3d9; --gold:#ff8fb8; --gold-deep:#e85f93;
    --mint:#7fe0c0; --coral:#ff6b9d; --cream:#fff3f8; --ink:#43203a;
    --card:rgba(255,255,255,0.12); --card-solid:#ffe9f3;
    --accent:#ff8fb8; --accent-deep:#e85f93; --accent-soft:#ffb3d9;
    --glyph:"💗";
  }
  html[data-theme="blue"]{
    --bg1:#1f4a6b; --bg2:#123a52; --bg3:#0a2536;
    --night-2:#1a4a63; --lilac:#9ad6ff; --gold:#6fd2ff; --gold-deep:#2f9bd4;
    --mint:#5fe0d6; --coral:#7aa8ff; --cream:#eef9ff; --ink:#10324a;
    --card:rgba(255,255,255,0.12); --card-solid:#e3f4ff;
    --accent:#6fd2ff; --accent-deep:#2f9bd4; --accent-soft:#9ad6ff;
    --glyph:"❄️";
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Fredoka',system-ui,-apple-system,sans-serif; color:var(--cream);
    background:radial-gradient(120% 80% at 50% -10%, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
    overflow:hidden; overscroll-behavior:none; -webkit-user-select:none; user-select:none; touch-action:manipulation;
    transition:background .4s ease;
  }
  #sky{position:fixed;inset:0;z-index:0;pointer-events:none;}
  .star-dot{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:tw 4s ease-in-out infinite;}
  @keyframes tw{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.85;transform:scale(1)}}

  #app{position:relative;z-index:1;height:100%;display:flex;flex-direction:column;
       padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  .screen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fade .35s ease;}
  .screen.active{display:flex;}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  h1{font-size:clamp(2rem,7vw,3.4rem);font-weight:700;margin:0;letter-spacing:.5px;text-shadow:0 2px 0 rgba(0,0,0,.15);}
  .tag{color:var(--lilac);font-weight:500;margin:6px 0 0;font-size:1.05rem;}

  .btn{font-family:inherit;font-weight:600;border:none;cursor:pointer;border-radius:20px;padding:16px 22px;
       font-size:1.15rem;color:var(--ink);background:var(--accent);box-shadow:0 6px 0 var(--accent-deep);transition:transform .08s,box-shadow .08s;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--accent-deep);}
  .btn.ghost{background:var(--card);color:var(--cream);box-shadow:0 6px 0 rgba(0,0,0,.25);}
  .btn.ghost:active{box-shadow:0 2px 0 rgba(0,0,0,.25);}
  .btn.wide{width:100%;max-width:420px;}

  .topbar{position:absolute;top:calc(env(safe-area-inset-top) + 14px);left:0;right:0;display:flex;align-items:center;
          justify-content:space-between;padding:0 18px;z-index:5;}
  .pill{background:var(--card);border-radius:999px;padding:8px 14px;display:flex;align-items:center;gap:8px;font-weight:600;backdrop-filter:blur(6px);}
  .iconbtn{background:var(--card);border:none;color:var(--cream);width:44px;height:44px;border-radius:14px;font-size:1.3rem;
           cursor:pointer;display:grid;place-items:center;}
  .iconbtn:active{transform:scale(.92);}

  .langtog{display:flex;background:var(--card);border-radius:999px;padding:4px;font-weight:600;}
  .langtog button{border:none;background:transparent;color:var(--cream);padding:6px 12px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:.95rem;opacity:.6;}
  .langtog button.on{background:var(--accent);color:var(--ink);opacity:1;}

  /* theme picker chips */
  .themes{display:flex;gap:12px;justify-content:center;margin-top:10px;}
  .theme-chip{width:54px;height:54px;border-radius:50%;cursor:pointer;border:3px solid transparent;display:grid;place-items:center;font-size:1.4rem;transition:transform .1s;}
  .theme-chip:active{transform:scale(.9);}
  .theme-chip.on{border-color:#fff;}
  .tc-neutral{background:radial-gradient(circle at 30% 30%,#2c3f6b,#131f38);}
  .tc-pink{background:radial-gradient(circle at 30% 30%,#ff8fb8,#3e1f43);}
  .tc-blue{background:radial-gradient(circle at 30% 30%,#6fd2ff,#0a2536);}

  .grid{display:grid;gap:18px;width:100%;max-width:560px;}
  .profiles{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-top:8px;}
  .profile-card{background:var(--card);border-radius:var(--radius);padding:18px 14px 16px;text-align:center;cursor:pointer;border:2px solid transparent;transition:transform .12s;}
  .profile-card:active{transform:scale(.96);}
  .profile-card .ava{width:84px;height:84px;margin:0 auto;}
  .profile-card .pname{margin-top:8px;font-weight:600;font-size:1.1rem;}
  .profile-card .pstars{color:var(--accent);font-size:.95rem;margin-top:2px;}
  .profile-card.add{display:grid;place-items:center;color:var(--lilac);border:2px dashed var(--accent-soft);min-height:150px;}
  .profile-card.add .plus{font-size:2.4rem;}

  .ages{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));max-width:680px;}
  .age-card{background:var(--card);border-radius:var(--radius);padding:20px 16px;cursor:pointer;text-align:center;border:2px solid transparent;transition:transform .12s;position:relative;overflow:hidden;}
  .age-card:active{transform:scale(.96);}
  .age-card .emoji{font-size:2.6rem;}
  .age-card .arange{font-weight:700;font-size:1.3rem;margin-top:6px;}
  .age-card .adesc{color:var(--lilac);font-size:.9rem;margin-top:4px;min-height:2.4em;}
  .age-card .aprog{margin-top:10px;height:8px;background:rgba(0,0,0,.25);border-radius:999px;overflow:hidden;}
  .age-card .aprog>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-deep));width:0;}
  .age-card .apct{font-size:.78rem;color:var(--cream);margin-top:4px;opacity:.8;}

  .maphead{text-align:center;margin-bottom:8px;}
  .maphead h1{font-size:clamp(1.6rem,5vw,2.4rem);}
  .map{position:relative;width:100%;max-width:560px;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 0 40px;}
  .node{position:relative;width:74px;height:74px;margin:0 auto;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:1.5rem;cursor:pointer;border:3px solid transparent;transition:transform .1s;}
  .node-wrap{display:flex;flex-direction:column;align-items:center;margin:9px 0;position:relative;}
  .node.locked{background:var(--card);color:rgba(255,255,255,.4);cursor:not-allowed;}
  .node.open{background:var(--night-2);color:var(--cream);box-shadow:0 5px 0 rgba(0,0,0,.3);}
  .node.done{background:linear-gradient(160deg,var(--mint),#3bbf8a);color:#0c3b29;box-shadow:0 5px 0 #2c9b6e;}
  .node.boss{background:linear-gradient(160deg,var(--accent),var(--accent-deep));color:var(--ink);box-shadow:0 5px 0 rgba(0,0,0,.25);}
  .node.boss.locked{background:var(--card);color:rgba(255,255,255,.4);box-shadow:none;}
  .node.current{border-color:#fff;animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 5px 0 rgba(0,0,0,.3),0 0 0 0 rgba(255,255,255,.5)}50%{box-shadow:0 5px 0 rgba(0,0,0,.3),0 0 0 10px rgba(255,255,255,0)}}
  .node:active{transform:scale(.94);}
  .node .nstars{position:absolute;bottom:-12px;font-size:.7rem;color:var(--accent);white-space:nowrap;letter-spacing:1px;}
  .node-label{font-size:.72rem;color:var(--lilac);margin-top:14px;}

  .quizwrap{width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center;gap:20px;}
  .progress{width:100%;height:14px;background:var(--card);border-radius:999px;overflow:hidden;}
  .progress>div{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-deep));border-radius:999px;transition:width .4s ease;}
  .question{font-size:clamp(2.6rem,11vw,4.4rem);font-weight:700;text-align:center;background:var(--card-solid);color:var(--ink);
            border-radius:var(--radius);padding:26px 20px;width:100%;box-shadow:var(--shadow);min-height:130px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
  /* picture counting */
  .pics{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;max-width:420px;}
  .pics span{font-size:2.6rem;animation:plop .3s ease backwards;}
  @keyframes plop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .answers{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;}
  .answer{font-family:inherit;font-weight:700;font-size:1.8rem;border:none;cursor:pointer;background:var(--night-2);color:var(--cream);
          border-radius:20px;padding:24px 10px;box-shadow:0 6px 0 rgba(0,0,0,.3);transition:transform .08s,box-shadow .08s;}
  .answer:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.3);}
  .answer.correct{background:var(--mint);color:#0c3b29;animation:pop .3s;}
  .answer.wrong{background:var(--coral);color:#5b1414;animation:shake .35s;}
  .answer:disabled{opacity:.55;}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.12)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .qcount{color:var(--lilac);font-weight:600;}
  .qbadge{color:var(--accent);font-weight:600;font-size:.95rem;}

  .reward{text-align:center;}
  .reward .big{font-size:5rem;animation:pop .5s;}
  .star-row{font-size:3rem;margin:10px 0;letter-spacing:6px;}
  .earned{color:var(--accent);font-size:1.4rem;font-weight:700;}

  /* studio */
  .studio{width:100%;max-width:640px;}
  .ava-stage{width:200px;height:200px;margin:6px auto 0;position:relative;}
  .ava-stage svg{width:100%;height:100%;display:block;}
  .slottabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:16px 0 12px;}
  .slottab{background:var(--card);border:none;color:var(--cream);font-family:inherit;font-weight:600;padding:9px 14px;border-radius:14px;cursor:pointer;font-size:.95rem;opacity:.7;}
  .slottab.on{background:var(--accent);color:var(--ink);opacity:1;}
  .shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:10px;}
  .item{aspect-ratio:1;border-radius:18px;background:var(--card);display:grid;place-items:center;cursor:pointer;position:relative;border:2px solid transparent;overflow:hidden;}
  .item svg{width:80%;height:80%;}
  .item .swatch{width:60%;height:60%;border-radius:50%;}
  .item.sel{border-color:var(--accent);}
  .item.locked{opacity:.45;}
  .item .cost{position:absolute;bottom:2px;right:4px;font-size:.62rem;color:var(--accent);font-weight:700;background:rgba(0,0,0,.35);padding:1px 4px;border-radius:6px;}
  .item .none-x{font-size:1.4rem;color:var(--lilac);}

  .toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(120px);background:var(--ink);color:var(--cream);
         padding:12px 20px;border-radius:999px;font-weight:600;z-index:50;transition:transform .35s;box-shadow:var(--shadow);}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:660px;padding-bottom:20px;}
  label.field{display:block;width:100%;max-width:420px;text-align:left;margin-top:10px;}
  label.field span{display:block;color:var(--lilac);font-size:.9rem;margin-bottom:6px;}
  input.txt{width:100%;font-family:inherit;font-size:1.2rem;padding:14px 16px;border-radius:16px;border:none;background:var(--card-solid);color:var(--ink);}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div id="sky"></div>
<div id="app">

  <div class="topbar" id="topbar" style="display:none">
    <button class="iconbtn" id="backBtn">‹</button>
    <div class="pill" id="starPill">⭐ <span id="starCount">0</span></div>
    <button class="iconbtn" id="homeBtn">⌂</button>
  </div>

  <section class="screen active" id="scrWelcome">
    <div class="langtog" style="position:absolute;top:calc(env(safe-area-inset-top) + 16px);right:18px">
      <button data-lang="uk" class="on">UA</button>
      <button data-lang="en">EN</button>
    </div>
    <div style="font-size:4.5rem" id="welcomeGlyph">🌟</div>
    <h1 data-t="title">Зорелік</h1>
    <p class="tag" data-t="subtitle">Математика, що сяє</p>
    <div class="themes" id="themePicker">
      <div class="theme-chip tc-neutral" data-theme="neutral" title="neutral">🌙</div>
      <div class="theme-chip tc-pink" data-theme="pink" title="pink">💗</div>
      <div class="theme-chip tc-blue" data-theme="blue" title="blue">❄️</div>
    </div>
    <div style="height:22px"></div>
    <button class="btn wide" id="startBtn" data-t="start">Грати</button>
  </section>

  <section class="screen" id="scrProfiles">
    <h1 data-t="whoPlays">Хто грає?</h1>
    <div class="grid profiles scrollable" id="profileGrid"></div>
  </section>

  <section class="screen" id="scrNewProfile">
    <h1 data-t="newProfile">Новий гравець</h1>
    <div class="ava-stage" id="npStage"></div>
    <div class="row" id="npSpeciesRow" style="margin:8px 0 4px"></div>
    <label class="field"><span data-t="yourName">Як тебе звати?</span>
      <input class="txt" id="npName" maxlength="12" placeholder="..."></label>
    <div style="height:16px"></div>
    <button class="btn wide" id="npCreate" data-t="create">Створити</button>
  </section>

  <section class="screen" id="scrAge">
    <h1 data-t="pickLevel">Обери світ</h1>
    <p class="tag" data-t="pickLevelSub">Кожен світ — 30 рівнів</p>
    <div class="grid ages scrollable" id="ageGrid"></div>
    <div style="height:14px"></div>
    <button class="btn ghost" id="ageStudio" data-t="customize">Прокачати героя</button>
  </section>

  <section class="screen" id="scrMap">
    <div class="maphead"><h1 id="mapTitle">Світ</h1><p class="tag" id="mapSub"></p></div>
    <div class="map" id="mapNodes"></div>
  </section>

  <section class="screen" id="scrQuiz">
    <div class="quizwrap">
      <div class="progress"><div id="progBar"></div></div>
      <div style="display:flex;justify-content:space-between;width:100%">
        <span class="qcount"><span id="qNow">1</span> / <span id="qTotal">10</span></span>
        <span class="qbadge" id="qLevelBadge"></span>
      </div>
      <div class="question" id="qText">2 + 2</div>
      <div class="answers" id="answers"></div>
    </div>
  </section>

  <section class="screen" id="scrReward">
    <div class="reward">
      <div class="big" id="rwEmoji">🎉</div>
      <h1 id="rwTitle">Чудово!</h1>
      <div class="star-row" id="rwStars">⭐⭐⭐</div>
      <p class="earned"><span data-t="youEarned">Зароблено</span> +<span id="rwEarned">3</span> ⭐</p>
      <p class="tag" id="rwUnlock" style="display:none"></p>
      <div style="height:20px"></div>
      <div class="row">
        <button class="btn" id="rwNext" data-t="nextLevel">Далі</button>
        <button class="btn ghost" id="rwAgain" data-t="playAgain">Ще раз</button>
        <button class="btn ghost" id="rwMap" data-t="toMap">До мапи</button>
      </div>
    </div>
  </section>

  <section class="screen" id="scrStudio">
    <div class="studio scrollable">
      <h1 data-t="studio">Прокачати героя</h1>
      <div class="ava-stage" id="studioStage"></div>
      <div class="slottabs" id="slotTabs"></div>
      <div class="shelf" id="studioShelf"></div>
      <div style="height:24px"></div>
      <button class="btn wide" id="studioDone" data-t="done">Готово</button>
    </div>
  </section>

</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ЗОРЕЛІК / STAR MATH  v3
   - 3 themes (neutral / pink / blue) with own glyphs & palettes
   - Original SVG mascots, layered customization (deep upgrades)
   - Picture-counting questions for the youngest world
   ============================================================ */

const LEVELS_PER_WORLD=30, QN_NORMAL=10, QN_BOSS=15, STARS_TO_UNLOCK=1;

/* ---------- i18n ---------- */
const I18N={
  uk:{title:"Зорелік",subtitle:"Математика, що сяє",start:"Грати",
    whoPlays:"Хто грає?",newProfile:"Новий гравець",yourName:"Як тебе звати?",create:"Створити",
    pickLevel:"Обери світ",pickLevelSub:"Кожен світ — 30 рівнів",youEarned:"Зароблено",
    playAgain:"Ще раз",customize:"Прокачати героя",nextLevel:"Далі",toMap:"До мапи",
    studio:"Прокачати героя",done:"Готово",addPlayer:"Додати",correct:"Правильно!",tryNext:"Майже!",
    locked:"Назбирай ще зірочок",bought:"Розблоковано!",levelLocked:"Спершу пройди попередній рівень",
    perfect:"Бездоганно!",good:"Молодець!",keepGoing:"Так тримати!",tryAgain:"Спробуй ще!",
    level:"Рівень",boss:"Зоряний бос",unlockedNext:"Відкрито наступний рівень!",worldDone:"Світ пройдено! 🏆",
    howMany:"Скільки тут?",
    slotBody:"Колір",slotSpecies:"Звірятко",slotFace:"Настрій",slotHat:"Шапка",slotGlasses:"Окуляри",slotItem:"Предмет",slotBg:"Фон",
    ageNames:["Малятко","Початок","Школярик","Майстер","Геній"],
    ageDesc:["Лічба й картинки","Додавання й віднімання","Множення й ділення","Дроби й відсотки","Рівняння й логіка"]},
  en:{title:"Star Math",subtitle:"Math that shines",start:"Play",
    whoPlays:"Who's playing?",newProfile:"New player",yourName:"What's your name?",create:"Create",
    pickLevel:"Pick a world",pickLevelSub:"Each world has 30 levels",youEarned:"Earned",
    playAgain:"Again",customize:"Upgrade hero",nextLevel:"Next",toMap:"Map",
    studio:"Upgrade hero",done:"Done",addPlayer:"Add",correct:"Correct!",tryNext:"Almost!",
    locked:"Earn more stars",bought:"Unlocked!",levelLocked:"Finish the previous level first",
    perfect:"Perfect!",good:"Well done!",keepGoing:"Keep it up!",tryAgain:"Try again!",
    level:"Level",boss:"Star boss",unlockedNext:"Next level unlocked!",worldDone:"World complete! 🏆",
    howMany:"How many?",
    slotBody:"Color",slotSpecies:"Animal",slotFace:"Mood",slotHat:"Hat",slotGlasses:"Glasses",slotItem:"Item",slotBg:"Scene",
    ageNames:["Tiny","Starter","Pupil","Master","Genius"],
    ageDesc:["Counting & pictures","Add & subtract","Multiply & divide","Fractions & %","Equations & logic"]}
};
let LANG=localStorage.getItem("sm_lang")||"uk";
const t=k=>(I18N[LANG][k]??k);
const ofWord=()=>LANG==="uk"?"від":"of";

/* ---------- theme ---------- */
const THEME_GLYPH={neutral:"🌟",pink:"💗",blue:"❄️"};
let THEME=localStorage.getItem("sm_theme")||"neutral";
function applyTheme(){
  document.documentElement.setAttribute("data-theme",THEME==="neutral"?"":THEME);
  if(THEME==="neutral") document.documentElement.removeAttribute("data-theme");
  document.getElementById("welcomeGlyph").textContent=THEME_GLYPH[THEME];
  document.querySelectorAll(".theme-chip").forEach(c=>c.classList.toggle("on",c.dataset.theme===THEME));
  document.querySelector('meta[name=theme-color]').setAttribute("content",
    THEME==="pink"?"#3e1f43":THEME==="blue"?"#123a52":"#1b2a4a");
}
document.querySelectorAll(".theme-chip").forEach(c=>{
  c.onclick=()=>{ THEME=c.dataset.theme; localStorage.setItem("sm_theme",THEME); applyTheme(); };
});

/* ============================================================
   SVG MASCOT BUILDER — layered, original art
   ============================================================ */
const BODY_COLORS=[

function lighten(hex,amt){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)+amt,g=((n>>8)&255)+amt,b=(n&255)+amt;
  r=Math.min(255,r);g=Math.min(255,g);b=Math.min(255,b);
  return "#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");
}
function darken(hex,amt){ return lighten(hex,-amt); }

function svgFace(face,species){

  const panda = species==="panda" ? `<ellipse cx="48" cy="58" rx="9" ry="11" fill="#3a3a4a"/><ellipse cx="72" cy="58" rx="9" ry="11" fill="#3a3a4a"/>` : "";

  let eyes,mouth;

function buildMascot(a){
  const body=(BODY_COLORS.find(x=>x.id===a.body)||BODY_COLORS[0]).hex;
  const belly=lighten(body,45), dark=darken(body,40);
  const accent=getComputedStyle(document.documentElement).getPropertyValue("--accent").trim()||"#ffd25a";
  return `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    ${svgBg(a.bg)}
    ${svgEars(a.species,body,dark)}
    ${svgHead(a.species,body,belly,dark)}
    ${svgFace(a.face,a.species)}
    ${svgGlasses(a.glasses)}
    ${svgHat(a.hat,accent)}
    ${svgItem(a.item,accent)}
  </svg>`;
}

/* ---------- storage ---------- */
function loadProfiles(){ try{return JSON.parse(localStorage.getItem("sm_profiles"))||[]}catch{return[]} }
function saveProfiles(p){ localStorage.setItem("sm_profiles",JSON.stringify(p)); }
let profiles=loadProfiles();
let current=null;

function defaultAvatar(){ return {body:"violet",species:"bear",face:"happy",hat:"none",glasses:"none",item:"none",bg:"none"}; }
function defaultUnlocks(){
  return {body:BODY_COLORS.filter(x=>x.c===0).map(x=>x.id),
          species:SPECIES.filter(x=>x.c===0).map(x=>x.id),
          face:FACES.filter(x=>x.c===0).map(x=>x.id),
          hat:["none"],glasses:["none"],item:["none"],bg:["none"]};
}
function newProfileObj(name,avatar){
  return {id:Date.now(),name:name||"Гравець",stars:0,
          avatar:avatar||defaultAvatar(),unlocked:defaultUnlocks(),progress:{}};
}
function migrate(p){
  if(!p.progress) p.progress={};
  if(!p.avatar){ p.avatar=defaultAvatar(); if(p.face) p.avatar.species="bear"; }
  if(!p.unlocked || !p.unlocked.body){ p.unlocked=defaultUnlocks(); }
  return p;
}
profiles=profiles.map(migrate);
function persist(){ saveProfiles(profiles); }

/* ---------- progress helpers ---------- */
function worldStars(w){const o=current.progress[w]||{};return Object.values(o).reduce((a,b)=>a+b,0);}
function levelStars(w,l){return (current.progress[w]||{})[l]||0;}
function isUnlocked(w,l){return l===0||levelStars(w,l-1)>=STARS_TO_UNLOCK;}
function isBoss(l){return (l+1)%5===0;}
function worldCompleted(w){const o=current.progress[w]||{};return Object.keys(o).filter(k=>o[k]>0).length;}

const screens=["Welcome","Profiles","NewProfile","Age","Map","Quiz","Reward","Studio"];
let navStack=[];
function show(name,push){const cur=document.querySelector(".screen.active");
  if(push&&cur)navStack.push(cur.id.replace("scr",""));
  screens.forEach(s=>document.getElementById("scr"+s).classList.toggle("active",s===name));
  document.getElementById("topbar").style.display=(name==="Welcome")?"none":"flex"; updateStarPill();}

document.getElementById("homeBtn").onclick=()=>{navStack=[];show("Profiles");renderProfiles();};
function afterNav(){const a=document.querySelector(".screen.active").id;
  if(a==="scrProfiles")renderProfiles(); if(a==="scrAge")renderAges(); if(a==="scrMap")renderMap();}

/* ---------- level map ---------- */
let mapWorld=0;
function openWorld(w){mapWorld=w;show("Map",true);renderMap();}
function renderMap(){
  const world=mapWorld;
  document.getElementById("mapTitle").textContent=`${EMO[world]} ${t("ageNames")[world]} · ${RANGES[world]}`;
  document.getElementById("mapSub").textContent=`${worldCompleted(world)}/${LEVELS_PER_WORLD} · ⭐ ${worldStars(world)}`;
  const wrap=document.getElementById("mapNodes");wrap.innerHTML="";let cur=null;
  for(let lvl=0;lvl<LEVELS_PER_WORLD;lvl++){
    const earned=levelStars(world,lvl),unlocked=isUnlocked(world,lvl),done=earned>0,boss=isBoss(lvl),isCur=unlocked&&!done;
    const nw=document.createElement("div");nw.className="node-wrap";nw.style.transform=`translateX(${Math.sin(lvl*0.9)*70}px)`;
    const node=document.createElement("div");
    let cls="node "+(boss?"boss ":"");
    if(!unlocked)cls+="locked";else if(done)cls+=(boss?"boss":"done");else cls+="open";
    if(isCur)cls+=" current";node.className=cls;
    node.innerHTML=!unlocked?`🔒`:(boss?"👑":(lvl+1));
    if(done){const s=document.createElement("div");s.className="nstars";s.textContent="⭐".repeat(earned)+"·".repeat(3-earned);node.appendChild(s);}
    node.onclick=()=>{if(!unlocked){toast(t("levelLocked"));return;}startLevel(world,lvl);};
    nw.appendChild(node);
    if(boss){const lab=document.createElement("div");lab.className="node-label";lab.textContent=t("boss");nw.appendChild(lab);}
    wrap.appendChild(nw);if(isCur&&!cur)cur=nw;
  }
  setTimeout(()=>{if(cur)cur.scrollIntoView({block:"center"});},30);
}

/* ============================================================
   QUESTIONS
   ============================================================ */
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=rnd(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildChoices(ans,spread){const set=new Set([ans]);let g=0;
  while(set.size<4&&g++<60){let d=ans+rnd(-spread,spread);if(d<0)d=Math.abs(d)+1;set.add(d);}
  while(set.size<4)set.add(ans+set.size);return shuffle([...set]);}

const COUNT_SETS=[["🍎","🍓","🍌","🍇","🍊"],["🥕","🥦","🌽","🍅","🥒"],["🐠","🐢","🦀","🐙","🐬"],["🌷","🌻","🌼","🌹","🌸"],["⭐","🎈","🎀","🍭","🧸"]];
function qCountPics(maxN){
  const set=COUNT_SETS[rnd(0,COUNT_SETS.length-1)];
  const emoji=set[rnd(0,set.length-1)];
  const n=rnd(1,maxN);
  return {pics:emoji.repeat(n),ans:n,choices:buildChoices(n,Math.min(3,maxN-1)),count:true,prompt:t("howMany")};
}

function makeQuestion(world,lvl){
  const tier=lvl/(LEVELS_PER_WORLD-1);
  switch(world){
    case 0:return qTiny(tier);
    case 1:return qAddSub(tier);
    case 2:return qMulDiv(tier);
    case 3:return qFractions(tier);
    case 4:return qEquations(tier);
  }
}
function qTiny(tier){
  const stage=Math.floor(tier*4);
  if(stage<=0) return qCountPics(5);
  if(stage===1) return qCountPics(10);
  if(stage===2){const a=rnd(1,5),b=rnd(1,5);return{q:`${a} + ${b}`,ans:a+b,choices:buildChoices(a+b,3)};}
  let a=rnd(2,10),b=rnd(1,a);return{q:`${a} − ${b}`,ans:a-b,choices:buildChoices(a-b,3)};
}
function qAddSub(tier){
  const max=Math.round(10+tier*40),stage=Math.floor(tier*4);
  if(stage>=3&&Math.random()<0.5){const a=rnd(2,max),b=rnd(2,max),c=rnd(1,a+b);return{q:`${a} + ${b} − ${c}`,ans:a+b-c,choices:buildChoices(a+b-c,6)};}
  if(Math.random()<0.5){const a=rnd(1,max),b=rnd(1,max);return{q:`${a} + ${b}`,ans:a+b,choices:buildChoices(a+b,Math.max(4,Math.round(max*.2)))};}
  let a=rnd(1,max),b=rnd(1,max);if(b>a)[a,b]=[b,a];return{q:`${a} − ${b}`,ans:a-b,choices:buildChoices(a-b,Math.max(4,Math.round(max*.2)))};
}
function qMulDiv(tier){
  const top=Math.round(5+tier*7),stage=Math.floor(tier*4);
  if(stage>=3&&Math.random()<0.4){const a=rnd(2,top),b=rnd(2,top),c=rnd(2,9);return{q:`${a} × ${b} + ${c}`,ans:a*b+c,choices:buildChoices(a*b+c,8)};}
  if(Math.random()<0.5){const a=rnd(2,top),b=rnd(2,top);return{q:`${a} × ${b}`,ans:a*b,choices:buildChoices(a*b,Math.max(6,top))};}
  const b=rnd(2,top),ans=rnd(2,top);return{q:`${b*ans} ÷ ${b}`,ans,choices:buildChoices(ans,5)};
}
function qFractions(tier){
  const stage=Math.floor(tier*4);
  if(stage===0){const pct=[10,25,50][rnd(0,2)],base=[20,40,60,80,100][rnd(0,4)],ans=base*pct/100;return{q:`${pct}% ${ofWord()} ${base}`,ans,choices:buildChoices(ans,Math.max(5,Math.round(ans*.4)))};}
  if(stage===1){const pct=[5,15,20,30,40,75][rnd(0,5)],base=[20,40,60,80,120,200][rnd(0,5)],ans=base*pct/100;return{q:`${pct}% ${ofWord()} ${base}`,ans,choices:buildChoices(ans,Math.max(6,Math.round(ans*.4)))};}
  if(stage===2){const den=[2,3,4,5,6][rnd(0,4)],num=rnd(1,den-1),base=den*rnd(2,9),ans=base/den*num;return{q:`${num}/${den} ${ofWord()} ${base}`,ans,choices:buildChoices(ans,6)};}
  const den=[4,5,6,8,10][rnd(0,4)],n1=rnd(1,den-1),n2=rnd(1,den-1);return{q:`${n1}/${den} + ${n2}/${den}`,ans:n1+n2,choices:buildChoices(n1+n2,3),suffix:`/${den}`};
}
function qEquations(tier){
  const stage=Math.floor(tier*5),top=Math.round(8+tier*20);
  if(stage<=0){const x=rnd(2,top),b=rnd(1,top);return{q:`x + ${b} = ${x+b},  x = ?`,ans:x,choices:buildChoices(x,5)};}
  if(stage===1){const x=rnd(2,top),b=rnd(1,top);return{q:`x − ${b} = ${x-b},  x = ?`,ans:x,choices:buildChoices(x,5)};}
  if(stage===2){const x=rnd(2,12),k=rnd(2,6);return{q:`${k}·x = ${k*x},  x = ?`,ans:x,choices:buildChoices(x,4)};}
  if(stage===3){const a=rnd(2,8),b=rnd(2,8),c=rnd(2,8);return{q:`${a} + ${b} × ${c}`,ans:a+b*c,choices:buildChoices(a+b*c,8)};}
  const x=rnd(2,9),k=rnd(2,5),b=rnd(1,12);return{q:`${k}·x + ${b} = ${k*x+b},  x = ?`,ans:x,choices:buildChoices(x,4)};
}

/* ---------- quiz flow ---------- */
let quiz={};
function startLevel(world,lvl){
  const boss=isBoss(lvl);
  quiz={i:0,correct:0,world,lvl,total:boss?QN_BOSS:QN_NORMAL,boss};
  document.getElementById("qTotal").textContent=quiz.total;
  document.getElementById("qLevelBadge").textContent=boss?"👑 "+t("boss"):t("level")+" "+(lvl+1);
  show("Quiz",true);nextQuestion();
}
function nextQuestion(){
  if(quiz.i>=quiz.total)return finishLevel();
  quiz.cur=makeQuestion(quiz.world,quiz.lvl);
  document.getElementById("qNow").textContent=quiz.i+1;
  document.getElementById("progBar").style.width=(quiz.i/quiz.total*100)+"%";
  const qt=document.getElementById("qText");
  if(quiz.cur.count){
    qt.style.fontSize="";
    let pics='<div style="display:flex;flex-direction:column;gap:12px;align-items:center"><div style="font-size:1.3rem;color:var(--ink);font-weight:600">'+quiz.cur.prompt+'</div><div class="pics">';
    [...quiz.cur.pics].forEach((ch,i)=>{ pics+=`<span style="animation-delay:${i*0.06}s">${ch}</span>`; });
    pics+='</div></div>'; qt.innerHTML=pics;
  } else {
    qt.textContent=quiz.cur.q;
    qt.style.fontSize=quiz.cur.big?"clamp(2rem,9vw,3.4rem)":"";
  }
  const sfx=quiz.cur.suffix||"";
  const box=document.getElementById("answers");box.innerHTML="";
  quiz.cur.choices.forEach(ch=>{const b=document.createElement("button");b.className="answer";b.textContent=ch+sfx;b.onclick=()=>pick(b,ch);box.appendChild(b);});
}
let lock=false;
function pick(btn,val){
  if(lock)return;lock=true;
  const buttons=[...document.querySelectorAll(".answer")];buttons.forEach(b=>b.disabled=true);
  const sfx=quiz.cur.suffix||"";
  if(val===quiz.cur.ans){btn.classList.add("correct");quiz.correct++;awardStars(1);toast(t("correct"));}
  else{btn.classList.add("wrong");toast(t("tryNext"));buttons.forEach(b=>{if(b.textContent===quiz.cur.ans+sfx)b.classList.add("correct");});}
  setTimeout(()=>{lock=false;quiz.i++;nextQuestion();},val===quiz.cur.ans?600:1150);
}
function awardStars(n){current.stars+=n;persist();updateStarPill();}
function finishLevel(){
  document.getElementById("progBar").style.width="100%";
  const c=quiz.correct,total=quiz.total,ratio=c/total;
  let rating=ratio>=0.95?3:ratio>=0.75?2:ratio>=0.5?1:0;
  let bonus=0;if(quiz.boss)bonus+=rating;if(rating===3)bonus+=1;if(bonus>0)awardStars(bonus);
  const w=current.progress[quiz.world]||(current.progress[quiz.world]={});
  const prev=w[quiz.lvl]||0,nr=Math.max(prev,rating);w[quiz.lvl]=nr;persist();
  const justUnlocked=prev<STARS_TO_UNLOCK&&nr>=STARS_TO_UNLOCK&&quiz.lvl+1<LEVELS_PER_WORLD;
  const finishedWorld=quiz.lvl+1===LEVELS_PER_WORLD&&nr>=STARS_TO_UNLOCK;
  let emoji,title;
  if(rating===3){emoji=quiz.boss?"🏆":"🌟";title=t("perfect");}
  else if(rating===2){emoji="✨";title=t("good");}
  else if(rating===1){emoji="💪";title=t("keepGoing");}
  else{emoji="🔁";title=t("tryAgain");}
  document.getElementById("rwEmoji").textContent=emoji;
  document.getElementById("rwTitle").textContent=title;
  document.getElementById("rwStars").textContent="⭐".repeat(rating)+"☆".repeat(3-rating);
  document.getElementById("rwEarned").textContent=c+bonus;
  const un=document.getElementById("rwUnlock");
  if(finishedWorld){un.style.display="";un.textContent=t("worldDone");}
  else if(justUnlocked){un.style.display="";un.textContent=t("unlockedNext");}
  else un.style.display="none";
  document.getElementById("rwNext").style.display=(quiz.lvl+1<LEVELS_PER_WORLD&&nr>=STARS_TO_UNLOCK)?"":"none";
  if(rating>=2)burst();
  show("Reward");
}
document.getElementById("rwNext").onclick=()=>startLevel(quiz.world,quiz.lvl+1);
document.getElementById("rwAgain").onclick=()=>startLevel(quiz.world,quiz.lvl);
document.getElementById("rwMap").onclick=()=>{show("Map");renderMap();};

/* ---------- confetti ---------- */
function burst(){
  const glyph=THEME_GLYPH[THEME];
  const colors=["#ffd25a","#5fd6a6","#ff7a7a","#a89be0","#fff"];
  for(let i=0;i<26;i++){const s=document.createElement("div");s.textContent=Math.random()<0.5?glyph:"⭐";
    s.style.cssText=`position:fixed;left:50%;top:30%;z-index:40;font-size:${rnd(14,26)}px;pointer-events:none;color:${colors[rnd(0,4)]};`;
    document.body.appendChild(s);
    const dx=(Math.random()-.5)*window.innerWidth*1.1,dy=(Math.random()-.2)*window.innerHeight*0.9;
    s.animate([{transform:"translate(0,0) scale(.4)",opacity:1},{transform:`translate(${dx}px,${dy}px) rotate(${rnd(-360,360)}deg) scale(1)`,opacity:0}],
      {duration:rnd(900,1500),easing:"cubic-bezier(.2,.6,.3,1)"}).onfinish=()=>s.remove();}
}

/* ============================================================
   AVATAR STUDIO — slot tabs + shelves
   ============================================================ */
const SLOTS=[
  {key:"species",label:"slotSpecies",list:SPECIES,kind:"mascot"},
  {key:"body",label:"slotBody",list:BODY_COLORS,kind:"swatch"},
  {key:"face",label:"slotFace",list:FACES,kind:"mascot"},
  {key:"hat",label:"slotHat",list:HATS,kind:"mascot"},
  {key:"glasses",label:"slotGlasses",list:GLASSES,kind:"mascot"},
  {key:"item",label:"slotItem",list:ITEMS,kind:"mascot"},
  {key:"bg",label:"slotBg",list:BGS,kind:"mascot"}
];
let activeSlot="species";
function openStudio(){activeSlot="species";show("Studio",true);renderStudio();}
function renderStudio(){
  document.getElementById("studioStage").innerHTML=buildMascot(current.avatar);
  const tabs=document.getElementById("slotTabs");tabs.innerHTML="";
  SLOTS.forEach(s=>{const b=document.createElement("button");b.className="slottab"+(s.key===activeSlot?" on":"");
    b.textContent=t(s.label);b.onclick=()=>{activeSlot=s.key;renderStudio();};tabs.appendChild(b);});
  const slot=SLOTS.find(s=>s.key===activeSlot);
  const shelf=document.getElementById("studioShelf");shelf.innerHTML="";
  slot.list.forEach(it=>{
    const owned=current.unlocked[slot.key].includes(it.id);
    const sel=current.avatar[slot.key]===it.id;
    const el=document.createElement("div");el.className="item"+(sel?" sel":"")+(owned?"":" locked");
    if(slot.kind==="swatch"){const sw=document.createElement("div");sw.className="swatch";sw.style.background=it.hex;el.appendChild(sw);}
    else{
      // preview: render the mascot with just this attribute changed from a neutral base
      const base={...defaultAvatar()};
      if(slot.key==="species")base.species=it.id;
      else {base.species=current.avatar.species; base[slot.key]=it.id; base.body=current.avatar.body;}
      if(it.id==="none"&&slot.key!=="species"){el.innerHTML=`<span class="none-x">∅</span>`;}
      else el.innerHTML=buildMascot(base);
    }
    if(!owned){const c=document.createElement("div");c.className="cost";c.textContent=it.c+"⭐";el.appendChild(c);}
    el.onclick=()=>{
      if(owned){current.avatar[slot.key]=it.id;persist();renderStudio();}
      else if(current.stars>=it.c){current.stars-=it.c;current.unlocked[slot.key].push(it.id);current.avatar[slot.key]=it.id;persist();updateStarPill();toast(t("bought"));renderStudio();}
      else toast(t("locked"));
    };
    shelf.appendChild(el);
  });
}
document.getElementById("studioDone").onclick=()=>{persist();show("Age");renderAges();};

/* ---------- misc ---------- */
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
document.getElementById("startBtn").onclick=()=>{show("Profiles",true);renderProfiles();};
(function sky(){const sky=document.getElementById("sky");const n=Math.min(70,Math.floor(window.innerWidth*window.innerHeight/14000));

applyTheme();
applyLang();
renderProfiles();
